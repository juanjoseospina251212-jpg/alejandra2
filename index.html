<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Planner Premium</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
background:linear-gradient(135deg,#fff1f7,#e6f7ff);
color:#444;
}

header{
text-align:center;
padding:80px 20px;
background:linear-gradient(135deg,#ffd6e0,#d6ecff);
}

h1{font-size:3rem;color:#6d597a;}
section{padding:60px 20px;text-align:center;}

.btn{
padding:12px 25px;
border:none;
border-radius:25px;
background:#a2d2ff;
color:#fff;
cursor:pointer;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:15px;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.03);
}

form{
max-width:400px;
margin:auto;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<header>
<h1>Elegance Wedding</h1>
<p>Tu boda perfecta empieza aquí</p>
</header>

<section>
<h2>Galería</h2>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1606800052052-a08af7148866?fm=jpg&q=60&w=3000&auto=format&fit=crop">
<img src="https://luciasecasa.com/wp-content/uploads/2024/04/novios-boda-baile-e1716975372265-960x1183.jpg">
<img src="https://images.squarespace-cdn.com/content/v1/56216fc2e4b059c47b425496/aeaa823f-5935-40a2-9d7d-8f6a4af0338a/Las+fotos+que+no+pueden+faltar+en+el+d%C3%ADa+de+tu+boda?format=2500w">
</div>
</section>

<section>
<h2>Contacto</h2>

<form action="https://formsubmit.co/alecorgu11@gmail.com" method="POST">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">

<input type="text" name="Nombre" placeholder="Nombre" required>
<input type="email" name="Correo" placeholder="Correo" required>
<textarea name="Mensaje" placeholder="Mensaje" required></textarea>

<button class="btn" type="submit">Enviar</button>
</form>

<p>Email: alecorgu11@gmail.com</p>
<p>Tel: +57 304 6338009</p>

</section>

</body>
</html>
